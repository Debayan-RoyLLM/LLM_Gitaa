model_list:
  # --- Pick your 3 active models, example below ---
  - model_name: qwen3-8b
    litellm_params:
      model: openai/qwen3-8b
      api_base: http://localhost:8006/v1
      api_key: "not-needed"
      stream: true
      max_tokens: 2048

  - model_name: qwen-2.5-coder-7b
    litellm_params:
      model: openai/qwen-2.5-coder-7b
      api_base: http://localhost:8007/v1
      api_key: "not-needed"
      stream: true
      max_tokens: 2048

  # - model_name: llama-3.2-3b ...
  # - model_name: gemma-4-31b ...
  # - model_name: qwen-2.5-coder-7b ...
  # - model_name: llama-3.2-11b-vision ...

litellm_settings:
  num_retries: 3
  request_timeout: 120
  telemetry: false
  default_max_tokens: 4096
  drop_params: true
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]

router_settings:
  routing_strategy: "least-busy"
  num_retries: 3
  retry_after: 2
  timeout: 120
  allowed_fails: 2
  cooldown_time: 60
  enable_pre_call_checks: true

cache:
  type: "redis"
  host: "redis"
  port: 6379
  ttl: 3600
  similarity_threshold: 0.85

general_settings:                        # ← single block, not two
  master_key: "internal-key"
 # database_url: "postgresql://user:pass@postgres:5432/litellm"
 # store_model_in_db: true

guardrails:
  - guardrail_name: "block-cc"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      pii_entities_config:
        CREDIT_CARD: "BLOCK"

  - guardrail_name: "pii-mask"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      pii_entities_config:
        EMAIL_ADDRESS: "MASK"
        PHONE_NUMBER: "MASK"
        US_SSN: "MASK"

