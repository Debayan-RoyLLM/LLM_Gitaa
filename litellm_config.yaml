general_settings:
  master_key: "internal-key"

general_settings:
  master_key: "internal-key"   # replace with a strong random sk-... value before real use

guardrails:
  # (1) BLOCK: reject any request containing a card number. Does not reach the model.
  - guardrail_name: "block-cc"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      pii_entities_config:
        CREDIT_CARD: "BLOCK"

  # (2) MASK: redact structured PII on input. EMAIL / PHONE / SSN rarely appear
  #     in legitimate code or SQL, so masking them is low-risk across your fleet.
  - guardrail_name: "pii-mask"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      pii_entities_config:
        EMAIL_ADDRESS: "MASK"
        PHONE_NUMBER: "MASK"
        US_SSN: "MASK"
      # PERSON and IP_ADDRESS deliberately left out: they corrupt real code/SQL
      # (column names, config IPs). Add them only if/when you can scope per-key.
